spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/product_service
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    enabled: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  observations:
    key-values:
      application: product-service
  tracing:
    sampling:
      probability: 1.0

loki:
  url: http://localhost:3100/loki/api/v1/push

minio:
  endpoint: http://localhost:9001
  public-endpoint: http://localhost:9001
  access-key: minioadmin
  secret-key: minioadmin
  bucket:
    product-images: product-images
  product-images:
    public-path: /api/product/images
    max-size-bytes: 5242880

shop:
  service:
    url: http://localhost:8086
