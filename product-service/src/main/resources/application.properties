spring.application.name=product-service
spring.datasource.url=jdbc:postgresql://localhost:5432/product_service
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

management.endpoints.web.exposure.include=health, info, metrics, prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.observations.key-values.application=product-service
management.tracing.sampling.probability=1.0

loki.url=http://localhost:3100/loki/api/v1/push

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

minio.endpoint=http://localhost:9001
minio.public-endpoint=http://localhost:9001
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket.product-images=product-images
minio.product-images.public-path=/api/product/images
minio.product-images.max-size-bytes=5242880

shop.service.url=http://localhost:8086
