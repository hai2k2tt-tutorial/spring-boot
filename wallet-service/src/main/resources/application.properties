spring.application.name=wallet-service
spring.datasource.url=jdbc:postgresql://localhost:5432/wallet_service
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.enabled=false
server.port=8088
customer.service.url=http://localhost:8087
shop.service.url=http://localhost:8086
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
management.endpoints.web.exposure.include=health, info, metrics, prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.observations.key-values.application=wallet-service
management.tracing.sampling.probability=1.0
loki.url=http://localhost:3100/loki/api/v1/push
