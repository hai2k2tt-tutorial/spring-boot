# Project-scoped Codex MCP servers for docker-compose.local.yml.
# Start Postgres first: docker compose -f docker-compose.local.yml up -d postgres

[mcp_servers.postgres_product]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres", "postgresql://postgres:postgres@127.0.0.1:5433/product_service"]
enabled = true
startup_timeout_sec = 30

