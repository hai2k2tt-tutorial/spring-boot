name: Build and deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      backend_modules:
        description: Space-separated backend modules to build. Leave both inputs empty to build all.
        required: false
        default: ""
      frontend_apps:
        description: Space-separated frontend apps to build. Leave both inputs empty to build all.
        required: false
        default: ""

concurrency:
  group: deploy-vps
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VPS_REPO_DIR: /root/spring-boot
  PLATFORMS: linux/amd64

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Compute build scope
        id: scope
        env:
          INPUT_BACKEND_MODULES: ${{ github.event.inputs.backend_modules }}
          INPUT_FRONTEND_APPS: ${{ github.event.inputs.frontend_apps }}
        run: |
          set -euo pipefail

          DEFAULT_BACKEND_MODULES="api-gateway product-service inventory-service order-service notification-service payment-service shop-service customer-service"
          DEFAULT_FRONTEND_APPS="landing-fe admin-fe shop-fe customer-fe-next customer-fe-angular"

          normalize_list() {
            printf '%s' "$1" | tr ',\n' '  ' | xargs
          }

          append_unique() {
            list="$1"
            item="$2"

            case " $list " in
              *" $item "*) printf '%s' "$list" ;;
              *) printf '%s' "$(printf '%s %s' "$list" "$item" | xargs)" ;;
            esac
          }

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            before_sha="${{ github.event.before }}"

            if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
              backend_modules="$DEFAULT_BACKEND_MODULES"
              frontend_apps="$DEFAULT_FRONTEND_APPS"
              deploy_mode="all"
            else
              changed_files="$(git diff --name-only "$before_sha" "$GITHUB_SHA")"
              backend_modules=""
              frontend_apps=""
              all_backend=false
              all_frontend=false

              while IFS= read -r path; do
                case "$path" in
                  pom.xml|.mvn/*|mvnw|mvnw.cmd|docker/spring-boot/Dockerfile)
                    all_backend=true
                    ;;
                  .github/workflows/deploy-vps.yml|scripts/docker-build-v2.sh|helm/*|helm/**)
                    all_backend=true
                    all_frontend=true
                    ;;
                  api-gateway/*)
                    backend_modules="$(append_unique "$backend_modules" "api-gateway")"
                    ;;
                  product-service/*)
                    backend_modules="$(append_unique "$backend_modules" "product-service")"
                    ;;
                  inventory-service/*)
                    backend_modules="$(append_unique "$backend_modules" "inventory-service")"
                    ;;
                  order-service/*)
                    backend_modules="$(append_unique "$backend_modules" "order-service")"
                    ;;
                  notification-service/*)
                    backend_modules="$(append_unique "$backend_modules" "notification-service")"
                    ;;
                  payment-service/*)
                    backend_modules="$(append_unique "$backend_modules" "payment-service")"
                    ;;
                  shop-service/*)
                    backend_modules="$(append_unique "$backend_modules" "shop-service")"
                    ;;
                  customer-service/*)
                    backend_modules="$(append_unique "$backend_modules" "customer-service")"
                    ;;
                  landing-fe/*)
                    frontend_apps="$(append_unique "$frontend_apps" "landing-fe")"
                    ;;
                  admin-fe/*)
                    frontend_apps="$(append_unique "$frontend_apps" "admin-fe")"
                    ;;
                  shop-fe/*)
                    frontend_apps="$(append_unique "$frontend_apps" "shop-fe")"
                    ;;
                  customer-fe-next/*)
                    frontend_apps="$(append_unique "$frontend_apps" "customer-fe-next")"
                    ;;
                  customer-fe-angular/*)
                    frontend_apps="$(append_unique "$frontend_apps" "customer-fe-angular")"
                    ;;
                esac
              done < <(printf '%s\n' "$changed_files")

              if [ "$all_backend" = "true" ]; then
                backend_modules="$DEFAULT_BACKEND_MODULES"
              fi

              if [ "$all_frontend" = "true" ]; then
                frontend_apps="$DEFAULT_FRONTEND_APPS"
              fi

              if [ -z "$backend_modules" ] && [ -z "$frontend_apps" ]; then
                backend_modules="__NONE__"
                frontend_apps="__NONE__"
                deploy_mode="none"
              elif [ "$all_backend" = "true" ] && [ "$all_frontend" = "true" ]; then
                deploy_mode="all"
              else
                [ -n "$backend_modules" ] || backend_modules="__NONE__"
                [ -n "$frontend_apps" ] || frontend_apps="__NONE__"
                deploy_mode="selected"
              fi
            fi
          else
            backend_modules="$(normalize_list "$INPUT_BACKEND_MODULES")"
            frontend_apps="$(normalize_list "$INPUT_FRONTEND_APPS")"

            if [ -z "$backend_modules" ] && [ -z "$frontend_apps" ]; then
              backend_modules="$DEFAULT_BACKEND_MODULES"
              frontend_apps="$DEFAULT_FRONTEND_APPS"
              deploy_mode="all"
            else
              [ -n "$backend_modules" ] || backend_modules="__NONE__"
              [ -n "$frontend_apps" ] || frontend_apps="__NONE__"
              deploy_mode="selected"
            fi
          fi

          printf 'BACKEND_MODULES=%s\n' "$backend_modules" >> "$GITHUB_ENV"
          printf 'FRONTEND_APPS=%s\n' "$frontend_apps" >> "$GITHUB_ENV"
          printf 'DEPLOY_MODE=%s\n' "$deploy_mode" >> "$GITHUB_ENV"
          printf 'deploy_mode=%s\n' "$deploy_mode" >> "$GITHUB_OUTPUT"

          echo "Backend modules: $backend_modules"
          echo "Frontend apps: $frontend_apps"
          echo "Deploy mode: $deploy_mode"

      - name: Set up Java
        if: steps.scope.outputs.deploy_mode != 'none'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Docker Buildx
        if: steps.scope.outputs.deploy_mode != 'none'
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        if: steps.scope.outputs.deploy_mode != 'none'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x scripts/docker-build-v2.sh

          build_backend_modules="$BACKEND_MODULES"
          build_frontend_apps="$FRONTEND_APPS"

          if [ "$build_backend_modules" = "__NONE__" ]; then
            build_backend_modules=" "
          fi

          if [ "$build_frontend_apps" = "__NONE__" ]; then
            build_frontend_apps=" "
          fi

          BACKEND_MODULES="$build_backend_modules" \
          FRONTEND_APPS="$build_frontend_apps" \
          ./scripts/docker-build-v2.sh

      - name: Configure SSH
        if: steps.scope.outputs.deploy_mode != 'none'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy Helm chart on VPS
        if: steps.scope.outputs.deploy_mode != 'none'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"

          ssh -i ~/.ssh/vps_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "IMAGE_TAG='$IMAGE_TAG' DOCKER_USERNAME='$DOCKER_USERNAME' DEPLOY_SHA='$GITHUB_SHA' DEPLOY_REF='$GITHUB_REF_NAME' REPO_DIR='$VPS_REPO_DIR' DEPLOY_MODE='$DEPLOY_MODE' BACKEND_MODULES='$BACKEND_MODULES' FRONTEND_APPS='$FRONTEND_APPS' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$REPO_DIR"
          git fetch --depth=1 origin "$DEPLOY_REF"
          git checkout --detach "$DEPLOY_SHA"

          IMAGE_PREFIX="docker.io/${DOCKER_USERNAME}"

          value_key_for_deploy() {
            case "$1" in
              api-gateway) printf '%s' "apiGateway" ;;
              product-service) printf '%s' "productService" ;;
              order-service) printf '%s' "orderService" ;;
              inventory-service) printf '%s' "inventoryService" ;;
              notification-service) printf '%s' "notificationService" ;;
              payment-service) printf '%s' "paymentService" ;;
              shop-service) printf '%s' "shopService" ;;
              customer-service) printf '%s' "customerService" ;;
              landing-fe) printf '%s' "landingFe" ;;
              admin-fe) printf '%s' "adminFe" ;;
              shop-fe) printf '%s' "shopFe" ;;
              customer-fe-next) printf '%s' "customerFeNext" ;;
              customer-fe-angular) printf '%s' "customerFeAngular" ;;
              *) echo "Unknown deploy name: $1" >&2; return 1 ;;
            esac
          }

          if [ "$DEPLOY_MODE" = "all" ]; then
            deployments="api-gateway product-service order-service inventory-service notification-service payment-service shop-service customer-service landing-fe admin-fe shop-fe customer-fe-next customer-fe-angular"
          else
            deployments=""
            if [ "$BACKEND_MODULES" != "__NONE__" ]; then
              deployments="$deployments $BACKEND_MODULES"
            fi
            if [ "$FRONTEND_APPS" != "__NONE__" ]; then
              deployments="$deployments $FRONTEND_APPS"
            fi
          fi

          helm_args=""
          if [ "$DEPLOY_MODE" = "selected" ]; then
            helm_args="$helm_args --reuse-values"
          fi

          for deploy in $deployments; do
            value_key="$(value_key_for_deploy "$deploy")"
            helm_args="$helm_args --set-string applications.${value_key}.image=${IMAGE_PREFIX}/${deploy}:${IMAGE_TAG}"
            helm_args="$helm_args --set-string applications.${value_key}.imagePullPolicy=Always"
          done

          helm dependency build helm/charts/applications
          helm dependency build helm/charts/infrastructure
          helm dependency build helm
          # shellcheck disable=SC2086
          helm upgrade --install microservices helm \
            --namespace microservices \
            --create-namespace \
            $helm_args

          for deploy in $deployments; do
            kubectl rollout status "deployment/${deploy}" \
              --namespace microservices \
              --timeout=300s
          done
          REMOTE
