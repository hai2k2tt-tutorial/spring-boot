global:
  namespace: microservices
  workloadScheduling:
    nodeSelector:
      kubernetes.io/hostname: k8s-worker
    tolerations: []
    affinity: {}

metricsServer:
  enabled: true
  fullnameOverride: metrics-server
  args:
    - --cert-dir=/tmp
    - --secure-port=10250
    - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
    - --kubelet-use-node-status-port
    - --metric-resolution=15s
    - --kubelet-insecure-tls

infrastructure:
  namespace: microservices
  mongodb:
    enabled: false
    fullnameOverride: mongodb
    image: mongo:7.0.5
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    rootUsername: root
    rootPassword: password
    database: product-service
    persistence:
      enabled: true
      storageClassName: standard
      size: 1Gi
      hostPath: /data/mongodb

  postgres:
    enabled: true
    fullnameOverride: postgres
    image: postgres:16-alpine
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    user: postgres
    password: postgres
    database: postgres
    persistence:
      enabled: true
      storageClassName: standard
      size: 1Gi
      hostPath: /data/postgres
    initSql: |
      CREATE DATABASE product_service;
      CREATE DATABASE order_service;
      CREATE DATABASE inventory_service;
      CREATE DATABASE payment_service;
      CREATE DATABASE shop_service;
      CREATE DATABASE customer_service;
      CREATE DATABASE wallet_service;

  minio:
    enabled: true
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    replicaCount: 1
    rootUser: minioadmin
    rootPassword: minioadmin
    bucket:
      productImages: product-images
    service:
      apiPort: 9000
      consolePort: 9001
    persistence:
      enabled: true
      storageClassName: standard
      size: 1Gi
      hostPath: /data/minio
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  kafka:
    enabled: true
    broker:
      image: confluentinc/cp-kafka:7.5.0
      replicaCount: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      serviceName: broker
      brokerId: "1"
      zookeeperConnect: zookeeper:2181
      listenerSecurityProtocolMap: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      advertisedListeners: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://broker:9092"
      offsetsTopicReplicationFactor: "1"
    zookeeper:
      image: confluentinc/cp-zookeeper:7.5.0
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      serviceName: zookeeper
      clientPort: "2181"
      tickTime: "2000"
    schemaRegistry:
      image: confluentinc/cp-schema-registry:7.5.0
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      serviceName: schema-registry
      hostName: schema-registry
      kafkaStoreBootstrapServers: broker:29092
      listeners: http://schema-registry:8081
    ui:
      image: provectuslabs/kafka-ui:latest
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
      serviceName: kafka-ui
      clustersName: local
      clustersBootstrapServers: broker:29092
      dynamicConfigEnabled: "true"

  keycloak:
    enabled: true
    fullnameOverride: keycloak
    image: quay.io/keycloak/keycloak:24.0.1
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    adminUser: admin
    adminPassword: admin
    hostname: keycloak.haint.fyi
    redirectUris:
      - https://admin-fe.haint.fyi
      - https://admin-fe.haint.fyi/*
      - https://admin-fe.haint.fyi/api/auth/callback/keycloak
      - https://admin-fe.haint.fyi/api/admin-fe/auth/callback/keycloak
      - https://shop-fe.haint.fyi
      - https://shop-fe.haint.fyi/*
      - https://shop-fe.haint.fyi/api/auth/callback/keycloak
      - https://shop-fe.haint.fyi/api/shop-fe/auth/callback/keycloak
      - https://customer-fe-next.haint.fyi
      - https://customer-fe-next.haint.fyi/*
      - https://customer-fe-next.haint.fyi/api/auth/callback/keycloak
      - https://customer-fe-next.haint.fyi/api/customer-fe-next/auth/callback/keycloak
      - https://customer-wallet-fe.haint.fyi
      - https://customer-wallet-fe.haint.fyi/*
      - https://customer-wallet-fe.haint.fyi/api/customer-wallet-fe/auth/callback/keycloak
      - https://shop-wallet-fe.haint.fyi
      - https://shop-wallet-fe.haint.fyi/*
      - https://shop-wallet-fe.haint.fyi/api/shop-wallet-fe/auth/callback/keycloak
      - https://customer-fe-angular.haint.fyi
      - https://customer-fe-angular.haint.fyi/*
    db:
      vendor: MYSQL
      host: keycloak-mysql
      database: keycloak
      user: keycloak
      password: password
    kcHttpEnabled: "true"
    kcHostnameStrict: "false"
    kcHostnameStrictHttps: "false"
    realmImport: ""

  keycloak-mysql:
    enabled: true
    fullnameOverride: keycloak-mysql
    image: mysql:8
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    rootPassword: root
    database: keycloak
    user: keycloak
    password: password
    persistence:
      enabled: true
      storageClassName: standard
      size: 1Gi
      hostPath: /data/keycloak-mysql

  mailhog:
    enabled: true
    fullnameOverride: mailhog
    image: axllent/mailpit:v1.27
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  observability:
    enabled: true
    grafana:
      image: grafana/grafana:10.1.0
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      anonymousEnabled: "true"
      anonymousOrgRole: Admin
      disableLoginForm: "true"
      datasourceYml: |
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus.default.svc.cluster.local:9090
            editable: false
            jsonData:
              httpMethod: POST
              exemplarTraceIdDestinations:
                - name: trace_id
                  datasourceUid: tempo
          - name: Tempo
            type: tempo
            access: proxy
            orgId: 1
            url: http://tempo.default.svc.cluster.local:3100
            basicAuth: false
            isDefault: true
            version: 1
            editable: false
            apiVersion: 1
            uid: tempo
            jsonData:
              httpMethod: GET
              tracesToLogs:
                datasourceUid: 'loki'
              nodeGraph:
                enabled: true
          - name: Loki
            type: loki
            uid: loki
            access: proxy
            orgId: 1
            url: http://loki.default.svc.cluster.local:3100
            basicAuth: false
            isDefault: false
            version: 1
            editable: false
            apiVersion: 1
            jsonData:
              derivedFields:
                - datasourceUid: tempo
                  matcherRegex: "\\[.+,(.+?),"
                  name: TraceID
                  url: $${__value.raw}
    prometheus:
      image: prom/prometheus:v2.46.0
      replicaCount: 1
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      configYml: |
        global:
          scrape_interval: 2s
          evaluation_interval: 2s

        scrape_configs:
          - job_name: 'api-gateway'
            metrics_path: '/actuator/prometheus'
            static_configs:
              - targets: [ 'api-gateway.microservices.svc.cluster.local:9000' ]
          - job_name: 'product-service'
            metrics_path: '/actuator/prometheus'
            static_configs:
              - targets: [ 'product-service.microservices.svc.cluster.local:8080' ]
                labels:
                  application: 'Product Service'
          - job_name: 'order-service'
            metrics_path: '/actuator/prometheus'
            static_configs:
              - targets: [ 'order-service.microservices.svc.cluster.local:8081' ]
                labels:
                  application: 'Order Service'
          - job_name: 'inventory-service'
            metrics_path: '/actuator/prometheus'
            static_configs:
              - targets: [ 'inventory-service.microservices.svc.cluster.local:8082' ]
                labels:
                  application: 'Inventory Service'
          - job_name: 'notification-service'
            metrics_path: '/actuator/prometheus'
            static_configs:
              - targets: [ 'notification-service.microservices.svc.cluster.local:8083' ]
                labels:
                  application: 'Notification Service'
          - job_name: 'payment-service'
            metrics_path: '/actuator/prometheus'
            static_configs:
              - targets: [ 'payment-service.microservices.svc.cluster.local:8085' ]
                labels:
                  application: 'Payment Service'
          - job_name: 'shop-service'
            metrics_path: '/actuator/prometheus'
            static_configs:
              - targets: [ 'shop-service.microservices.svc.cluster.local:8086' ]
                labels:
                  application: 'Shop Service'
          - job_name: 'customer-service'
            metrics_path: '/actuator/prometheus'
            static_configs:
              - targets: [ 'customer-service.microservices.svc.cluster.local:8087' ]
                labels:
                  application: 'Customer Service'
    loki:
      image: grafana/loki:main
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    tempo:
      image: grafana/tempo:2.2.2
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      storage:
        size: 1Gi
        storageClassName: standard
        hostPath: /data/tempo
      configYml: |
        server:
          http_listen_port: 3100

        distributor:
          receivers:
            zipkin:

        storage:
          trace:
            backend: local
            local:
              path: /tmp/tempo/blocks

applications:
  namespace: microservices
  commonConfig:
    lokiUrl: http://loki.microservices.svc.cluster.local:3100/loki/api/v1/push
    managementZipkinTracingEndpoint: http://tempo.microservices.svc.cluster.local:9411
    productServiceUrl: http://product-service.microservices.svc.cluster.local:8080
    orderServiceUrl: http://order-service.microservices.svc.cluster.local:8081
    inventoryServiceUrl: http://inventory-service.microservices.svc.cluster.local:8082
    springKafkaBootstrapServers: broker.microservices.svc.cluster.local:29092
  apiGateway:
    enabled: true
    image: docker.io/hai2k2tt/api-gateway:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 9000
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    config:
      customerIssuerUri: https://keycloak.haint.fyi/realms/ecommerce-customer
      customerJwkSetUri: http://keycloak.microservices.svc.cluster.local:8080/realms/ecommerce-customer/protocol/openid-connect/certs
      shopIssuerUri: https://keycloak.haint.fyi/realms/ecommerce-shop
      shopJwkSetUri: http://keycloak.microservices.svc.cluster.local:8080/realms/ecommerce-shop/protocol/openid-connect/certs
      adminIssuerUri: https://keycloak.haint.fyi/realms/ecommerce-admin
      adminJwkSetUri: http://keycloak.microservices.svc.cluster.local:8080/realms/ecommerce-admin/protocol/openid-connect/certs
  productService:
    enabled: true
    image: docker.io/hai2k2tt/product-service:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    config:
      datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/product_service
      minioEndpoint: http://minio.microservices.svc.cluster.local:9000
      minioPublicEndpoint: https://minio.haint.fyi
      minioSecretName: minio-secrets
      minioProductImagesBucket: product-images
      minioProductImagesPublicPath: /api/product/images
  orderService:
    enabled: true
    image: docker.io/hai2k2tt/order-service:2-amd64
    imagePullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8081
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    config:
      datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/order_service
      customerDatasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/customer_service
      customerDatasourceUsername: postgres
      customerDatasourcePassword: postgres
      schemaRegistryUrl: http://schema-registry.microservices.svc.cluster.local:8081
  inventoryService:
    enabled: true
    image: docker.io/hai2k2tt/inventory-service:2-amd64
    imagePullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8082
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    config:
      datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/inventory_service
  notificationService:
    enabled: true
    image: docker.io/hai2k2tt/notification-service:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 8083
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    config:
      schemaRegistryUrl: http://schema-registry.microservices.svc.cluster.local:8081
      mailHost: mailhog.microservices.svc.cluster.local
      mailPort: "1025"
  paymentService:
    enabled: true
    image: docker.io/hai2k2tt/payment-service:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 8085
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    config:
      datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/payment_service
      customerDatasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/customer_service
      customerDatasourceUsername: postgres
      customerDatasourcePassword: postgres
  shopService:
    enabled: true
    image: docker.io/hai2k2tt/shop-service:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 8086
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    config:
      datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/shop_service
  customerService:
    enabled: true
    image: docker.io/hai2k2tt/customer-service:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 8087
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    config:
      datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/customer_service
  landingFe:
    enabled: true
    image: docker.io/hai2k2tt/landing-fe:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 3005
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    config:
      adminFeUrl: https://admin-fe.haint.fyi
      shopFeUrl: https://shop-fe.haint.fyi
      customerFeUrl: https://customer-fe-next.haint.fyi
      customerWalletFeUrl: https://customer-wallet-fe.haint.fyi
      shopWalletFeUrl: https://shop-wallet-fe.haint.fyi
  adminFe:
    enabled: true
    image: docker.io/hai2k2tt/admin-fe:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 3002
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    config:
      apiBaseUrl: http://api-gateway.microservices.svc.cluster.local:9000/api
      nextPublicApiBaseUrl: https://api.haint.fyi/api
      authUrl: https://admin-fe.haint.fyi
      authIssuer: https://keycloak.haint.fyi/realms/ecommerce-admin
      authIssuerInternal: http://keycloak.microservices.svc.cluster.local:8080/realms/ecommerce-admin
      authClientId: admin-fe-client
      authClientSecret: ""
      authScope: openid profile offline_access
      authCookiePrefix: admin-fe
      authBasePath: /api/admin-fe/auth
      authSecret: replace-with-a-long-random-string
  shopFe:
    enabled: true
    image: docker.io/hai2k2tt/shop-fe:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 3003
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    config:
      apiBaseUrl: http://api-gateway.microservices.svc.cluster.local:9000/api
      nextPublicApiBaseUrl: https://api.haint.fyi/api
      authUrl: https://shop-fe.haint.fyi
      authIssuer: https://keycloak.haint.fyi/realms/ecommerce-shop
      authIssuerInternal: http://keycloak.microservices.svc.cluster.local:8080/realms/ecommerce-shop
      authClientId: shop-fe-client
      authClientSecret: ""
      authScope: openid profile offline_access
      authCookiePrefix: shop-fe
      authCookieDomain: ""
      authBasePath: /api/shop-fe/auth
      authSecret: replace-with-a-long-random-string
  customerFeNext:
    enabled: true
    image: docker.io/hai2k2tt/customer-fe-next:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 3004
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    config:
      apiBaseUrl: http://api-gateway.microservices.svc.cluster.local:9000/api
      nextPublicApiBaseUrl: https://api.haint.fyi/api
      authUrl: https://customer-fe-next.haint.fyi
      authIssuer: https://keycloak.haint.fyi/realms/ecommerce-customer
      authIssuerInternal: http://keycloak.microservices.svc.cluster.local:8080/realms/ecommerce-customer
      authClientId: customer-fe-client
      authClientSecret: ""
      authScope: openid profile offline_access
      authCookiePrefix: customer-fe-next
      authCookieDomain: ""
      authBasePath: /api/customer-fe-next/auth
      authSecret: replace-with-a-long-random-string
  customerFeAngular:
    enabled: true
    image: docker.io/hai2k2tt/customer-fe-angular:2-amd64
    imagePullPolicy: Always
    replicaCount: 1
    service:
      port: 80
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    config:
      apiBaseUrl: http://api-gateway.microservices.svc.cluster.local:9000/api

k8sGateway:
  enabled: true
  namespace: microservices
  gateway:
    name: api-gateway
    className: nginx
    listeners:
      - name: http
        port: 80
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: Same
      - name: https
        port: 443
        protocol: HTTPS
        tls:
          mode: Terminate
          certificateRefs:
            - name: haint-fyi-tls
        allowedRoutes:
          namespaces:
            from: Same
  certManager:
    enabled: true
    clusterIssuer:
      create: true
      name: letsencrypt-prod
      email: admin@haint.fyi
      server: https://acme-v02.api.letsencrypt.org/directory
      privateKeySecretRefName: letsencrypt-prod-account-key
    certificate:
      create: true
      name: haint-fyi-tls
      secretName: haint-fyi-tls
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      dnsNames: []
  routes:
    - name: api-route
      hostname: api.haint.fyi
      backendRefName: api-gateway
      backendRefPort: 9000
    - name: keycloak-route
      hostname: keycloak.haint.fyi
      backendRefName: keycloak
      backendRefPort: 8080
    - name: kafka-ui-route
      hostname: kafka-ui.haint.fyi
      backendRefName: kafka-ui
      backendRefPort: 8080
    - name: grafana-route
      hostname: grafana.haint.fyi
      backendRefName: grafana
      backendRefPort: 3000
    - name: tempo-route
      hostname: tempo.haint.fyi
      backendRefName: tempo
      backendRefPort: 3100
    - name: prometheus-route
      hostname: prometheus.haint.fyi
      backendRefName: prometheus
      backendRefPort: 9090
    - name: mailhog-route
      hostname: mailhog.haint.fyi
      backendRefName: mailhog
      backendRefPort: 8025
    - name: minio-route
      hostname: minio.haint.fyi
      backendRefName: minio
      backendRefPort: 9000
    - name: schema-registry-route
      hostname: schema-registry.haint.fyi
      backendRefName: schema-registry
      backendRefPort: 8081
    - name: loki-route
      hostname: loki.haint.fyi
      backendRefName: loki
      backendRefPort: 3100
    - name: landing-fe-route
      hostname: landing-fe.haint.fyi
      backendRefName: landing-fe
      backendRefPort: 3005
    - name: admin-fe-route
      hostname: admin-fe.haint.fyi
      backendRefName: admin-fe
      backendRefPort: 3002
    - name: shop-fe-route
      hostname: shop-fe.haint.fyi
      backendRefName: shop-fe
      backendRefPort: 3003
    - name: customer-fe-next-route
      hostname: customer-fe-next.haint.fyi
      backendRefName: customer-fe-next
      backendRefPort: 3004
    - name: customer-wallet-fe-route
      hostname: customer-wallet-fe.haint.fyi
      backendRefName: customer-wallet-fe
      backendRefPort: 3006
    - name: shop-wallet-fe-route
      hostname: shop-wallet-fe.haint.fyi
      backendRefName: shop-wallet-fe
      backendRefPort: 3007
    - name: customer-fe-angular-route
      hostname: customer-fe-angular.haint.fyi
      backendRefName: customer-fe-angular
      backendRefPort: 80
  proxySettingsPolicies:
    - name: frontend-proxy-settings
      targetRefs:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: landing-fe-route
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: admin-fe-route
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: shop-fe-route
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: customer-fe-next-route
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: customer-wallet-fe-route
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: shop-wallet-fe-route
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: customer-fe-angular-route
      buffering:
        bufferSize: 32k
        buffers:
          number: 8
          size: 32k
        busyBuffersSize: 64k
