enabled: true
namespace: microservices
image: docker.io/hai2k2tt/inventory-service:2-amd64
imagePullPolicy: IfNotPresent
replicaCount: 1
service:
  port: 8082
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi
config:
  datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/inventory_service
