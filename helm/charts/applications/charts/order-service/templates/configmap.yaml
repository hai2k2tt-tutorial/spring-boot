{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: {{ .Values.namespace }}
data:
  SPRING_DATASOURCE_URL: {{ .Values.config.datasourceUrl | quote }}
  CUSTOMER_DATASOURCE_URL: {{ .Values.config.customerDatasourceUrl | quote }}
  CUSTOMER_DATASOURCE_USERNAME: {{ .Values.config.customerDatasourceUsername | quote }}
  CUSTOMER_DATASOURCE_PASSWORD: {{ .Values.config.customerDatasourcePassword | quote }}
  SPRING_KAFKA_PRODUCER_PROPERTIES_SCHEMA_REGISTRY_URL: {{ .Values.config.schemaRegistryUrl | quote }}
{{- end }}
