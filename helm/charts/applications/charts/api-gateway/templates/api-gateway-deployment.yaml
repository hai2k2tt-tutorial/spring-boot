{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: api-gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
{{- with .Values.global.workloadScheduling.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.global.workloadScheduling.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.global.workloadScheduling.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: api-gateway
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: APP_SECURITY_CUSTOMER_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: APP_SECURITY_CUSTOMER_ISSUER_URI
            - name: APP_SECURITY_CUSTOMER_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: APP_SECURITY_CUSTOMER_JWK_SET_URI
            - name: APP_SECURITY_SHOP_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: APP_SECURITY_SHOP_ISSUER_URI
            - name: APP_SECURITY_SHOP_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: APP_SECURITY_SHOP_JWK_SET_URI
            - name: APP_SECURITY_ADMIN_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: APP_SECURITY_ADMIN_ISSUER_URI
            - name: APP_SECURITY_ADMIN_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: APP_SECURITY_ADMIN_JWK_SET_URI
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: LOKI_URL
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: PRODUCT_SERVICE_URL
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: ORDER_SERVICE_URL
            - name: INVENTORY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: INVENTORY_SERVICE_URL
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: PAYMENT_SERVICE_URL
            - name: SHOP_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: SHOP_SERVICE_URL
            - name: CUSTOMER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: CUSTOMER_SERVICE_URL
            - name: WALLET_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: WALLET_SERVICE_URL
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: SPRING_DATA_REDIS_PORT
          resources:
{{ toYaml .Values.resources | nindent 12 }}
{{- end }}
