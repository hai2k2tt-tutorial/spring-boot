{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: {{ .Values.namespace }}
  labels:
    app: payment-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
{{- with .Values.global.workloadScheduling.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.global.workloadScheduling.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.global.workloadScheduling.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: payment-service
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: SPRING_DATASOURCE_URL
            - name: CUSTOMER_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: CUSTOMER_DATASOURCE_URL
            - name: CUSTOMER_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: CUSTOMER_DATASOURCE_USERNAME
            - name: CUSTOMER_DATASOURCE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: CUSTOMER_DATASOURCE_PASSWORD
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: LOKI_URL
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: ORDER_SERVICE_URL
            - name: WALLET_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: WALLET_SERVICE_URL
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: PAYMENT_MOCK_CHECKOUT_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: PAYMENT_MOCK_CHECKOUT_BASE_URL
          resources:
{{ toYaml .Values.resources | nindent 12 }}
{{- end }}
