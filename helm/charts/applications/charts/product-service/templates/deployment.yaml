{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: {{ .Values.namespace }}
  labels:
    app: product-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
{{- with .Values.global.workloadScheduling.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.global.workloadScheduling.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.global.workloadScheduling.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: product-service
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: product-service-config
                  key: SPRING_DATASOURCE_URL
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: LOKI_URL
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: product-service-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.minioSecretName }}
                  key: root_user
            - name: MINIO_PUBLIC_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: product-service-config
                  key: MINIO_PUBLIC_ENDPOINT
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.minioSecretName }}
                  key: root_password
            - name: MINIO_BUCKET_PRODUCT_IMAGES
              valueFrom:
                configMapKeyRef:
                  name: product-service-config
                  key: MINIO_BUCKET_PRODUCT_IMAGES
            - name: MINIO_PRODUCT_IMAGES_PUBLIC_PATH
              valueFrom:
                configMapKeyRef:
                  name: product-service-config
                  key: MINIO_PRODUCT_IMAGES_PUBLIC_PATH
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
          resources:
{{ toYaml .Values.resources | nindent 12 }}
{{- end }}
