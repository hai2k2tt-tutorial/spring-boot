{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-fe-angular-nginx
  namespace: {{ .Values.namespace }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass {{ .Values.config.apiBaseUrl }}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-fe-angular
  namespace: {{ .Values.namespace }}
  labels:
    app: customer-fe-angular
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: customer-fe-angular
  template:
    metadata:
      labels:
        app: customer-fe-angular
    spec:
      containers:
        - name: customer-fe-angular
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
{{ toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: customer-fe-angular-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: customer-fe-angular
  namespace: {{ .Values.namespace }}
  labels:
    app: customer-fe-angular
spec:
  type: ClusterIP
  selector:
    app: customer-fe-angular
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
{{- end }}
