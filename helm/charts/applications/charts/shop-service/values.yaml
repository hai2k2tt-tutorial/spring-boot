enabled: true
namespace: microservices
image: docker.io/hai2k2tt/shop-service:2-amd64
imagePullPolicy: IfNotPresent
replicaCount: 1
service:
  port: 8086
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
config:
  datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/shop_service
