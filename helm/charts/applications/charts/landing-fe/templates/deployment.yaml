{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-fe
  namespace: {{ .Values.namespace }}
  labels:
    app: landing-fe
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: landing-fe
  template:
    metadata:
      labels:
        app: landing-fe
    spec:
      containers:
        - name: landing-fe
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: NEXT_PUBLIC_ADMIN_FE_URL
              value: {{ .Values.config.adminFeUrl | quote }}
            - name: NEXT_PUBLIC_SHOP_FE_URL
              value: {{ .Values.config.shopFeUrl | quote }}
            - name: NEXT_PUBLIC_CUSTOMER_FE_URL
              value: {{ .Values.config.customerFeUrl | quote }}
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:
{{ toYaml .Values.resources | nindent 12 }}
{{- end }}
