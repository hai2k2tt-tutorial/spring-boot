{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-fe
  namespace: {{ .Values.namespace }}
  labels:
    app: shop-fe
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: shop-fe
  template:
    metadata:
      labels:
        app: shop-fe
    spec:
      containers:
        - name: shop-fe
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: API_BASE_URL
              value: {{ .Values.config.apiBaseUrl | quote }}
            - name: NEXT_PUBLIC_API_BASE_URL
              value: {{ .Values.config.nextPublicApiBaseUrl | quote }}
            - name: AUTH_URL
              value: {{ .Values.config.authUrl | quote }}
            - name: NEXTAUTH_URL
              value: {{ .Values.config.authUrl | quote }}
            - name: AUTH_ISSUER
              value: {{ .Values.config.authIssuer | quote }}
            - name: AUTH_ISSUER_INTERNAL
              value: {{ .Values.config.authIssuerInternal | quote }}
            - name: AUTH_CLIENT_ID
              value: {{ .Values.config.authClientId | quote }}
            - name: AUTH_CLIENT_SECRET
              value: {{ .Values.config.authClientSecret | quote }}
            - name: AUTH_SCOPE
              value: {{ .Values.config.authScope | quote }}
            - name: AUTH_SECRET
              value: {{ .Values.config.authSecret | quote }}
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:
{{ toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: shop-fe
  namespace: {{ .Values.namespace }}
  labels:
    app: shop-fe
spec:
  type: ClusterIP
  selector:
    app: shop-fe
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
{{- end }}
