{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: customer-fe-next
  namespace: {{ .Values.namespace }}
  labels:
    app: customer-fe-next
spec:
  type: ClusterIP
  selector:
    app: customer-fe-next
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
{{- end }}
