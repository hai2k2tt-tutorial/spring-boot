namespace: microservices

gatewayApi:
  enabled: true

commonConfig:
  lokiUrl: http://loki.microservices.svc.cluster.local:3100/loki/api/v1/push
  managementZipkinTracingEndpoint: http://tempo.microservices.svc.cluster.local:9411
  productServiceUrl: http://product-service.microservices.svc.cluster.local:8080
  orderServiceUrl: http://order-service.microservices.svc.cluster.local:8081
  inventoryServiceUrl: http://inventory-service.microservices.svc.cluster.local:8082
  springKafkaBootstrapServers: broker.microservices.svc.cluster.local:29092

apiGateway:
  enabled: true
  image: docker.io/hai2k2tt/api-gateway:0.0.1-SNAPSHOT
  imagePullPolicy: Always
  replicaCount: 1
  service:
    port: 9000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    issuerUri: http://keycloak.haint.fyi:31437/realms/spring-microservices-security-realm

productService:
  enabled: true
  image: docker.io/hai2k2tt/product-service:1.0-SNAPSHOT
  imagePullPolicy: Always
  replicaCount: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    mongodbUri: mongodb://root:password@mongodb.microservices.svc.cluster.local:27017/product-service?authSource=admin

orderService:
  enabled: true
  image: docker.io/hai2k2tt/order-service:1.0-SNAPSHOT
  imagePullPolicy: Always
  replicaCount: 1
  service:
    port: 8081
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    datasourceUrl: jdbc:mysql://mysql.microservices.svc.cluster.local:3306/order_service
    schemaRegistryUrl: http://schema-registry.microservices.svc.cluster.local:8081

inventoryService:
  enabled: true
  image: docker.io/hai2k2tt/inventory-service:1.0-SNAPSHOT
  imagePullPolicy: Always
  replicaCount: 1
  service:
    port: 8082
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    datasourceUrl: jdbc:mysql://mysql.microservices.svc.cluster.local:3306/inventory_service

notificationService:
  enabled: true
  image: docker.io/hai2k2tt/notification-service:1.0-SNAPSHOT
  imagePullPolicy: Always
  replicaCount: 1
  service:
    port: 8083
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    schemaRegistryUrl: http://schema-registry.microservices.svc.cluster.local:8081

frontend:
  enabled: true
  image: hai2k2tt/frontend:latest
  imagePullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

frontendNext:
  enabled: true
  image: hai2k2tt/frontend-next:latest
  imagePullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  config:
    nextPublicApiBaseUrl: http://api.haint.fyi:31437/api
    authUrl: http://frontend-next.haint.fyi:31437
    authIssuer: http://keycloak.haint.fyi:31437/realms/spring-microservices-security-realm
    authIssuerInternal: http://keycloak.microservices.svc.cluster.local:8080/realms/spring-microservices-security-realm
    authClientId: angular-client
    authClientSecret: ""
    authScope: openid profile offline_access
    authSecret: replace-with-a-long-random-string
