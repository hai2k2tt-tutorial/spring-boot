  replicaCount: 1
  service:
    port: 8086
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  config:
    datasourceUrl: jdbc:postgresql://postgres.microservices.svc.cluster.local:5432/shop_service

customerService:
