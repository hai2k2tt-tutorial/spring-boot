namespace: microservices

gateway:
  name: api-gateway
  className: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
routes:
  - name: api-route
    hostname: api.haint.fyi
    backendRefName: api-gateway
    backendRefPort: 9000
  - name: keycloak-route
    hostname: keycloak.haint.fyi
    backendRefName: keycloak
    backendRefPort: 8080
  - name: kafka-ui-route
    hostname: kafka-ui.haint.fyi
    backendRefName: kafka-ui
    backendRefPort: 8080
  - name: grafana-route
    hostname: grafana.haint.fyi
    backendRefName: grafana
    backendRefPort: 3000
  - name: tempo-route
    hostname: tempo.haint.fyi
    backendRefName: tempo
    backendRefPort: 3100
  - name: prometheus-route
    hostname: prometheus.haint.fyi
    backendRefName: prometheus
    backendRefPort: 9090
  - name: mailhog-route
    hostname: mailhog.haint.fyi
    backendRefName: mailhog
    backendRefPort: 8025
  - name: minio-route
    hostname: minio.haint.fyi
    backendRefName: minio
    backendRefPort: 9000
  - name: schema-registry-route
    hostname: schema-registry.haint.fyi
    backendRefName: schema-registry
    backendRefPort: 8081
  - name: loki-route
    hostname: loki.haint.fyi
    backendRefName: loki
    backendRefPort: 3100
  - name: landing-fe-route
    hostname: landing-fe.haint.fyi
    backendRefName: landing-fe
    backendRefPort: 3005
  - name: admin-fe-route
    hostname: admin-fe.haint.fyi
    backendRefName: admin-fe
    backendRefPort: 3002
  - name: shop-fe-route
    hostname: shop-fe.haint.fyi
    backendRefName: shop-fe
    backendRefPort: 3003
  - name: customer-fe-next-route
    hostname: customer-fe-next.haint.fyi
    backendRefName: customer-fe-next
    backendRefPort: 3004
  - name: customer-fe-angular-route
    hostname: customer-fe-angular.haint.fyi
    backendRefName: customer-fe-angular
    backendRefPort: 80

proxySettingsPolicies:
  - name: frontend-proxy-settings
    targetRefs:
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: landing-fe-route
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: admin-fe-route
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: shop-fe-route
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: customer-fe-next-route
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: customer-fe-angular-route
    buffering:
      bufferSize: 32k
      buffers:
        number: 8
        size: 32k
      busyBuffersSize: 64k
