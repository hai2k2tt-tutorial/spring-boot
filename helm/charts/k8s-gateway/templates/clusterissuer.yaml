{{- if and .Values.certManager.enabled .Values.certManager.clusterIssuer.create }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name }}
spec:
  acme:
    email: {{ .Values.certManager.clusterIssuer.email | quote }}
    server: {{ .Values.certManager.clusterIssuer.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.certManager.clusterIssuer.privateKeySecretRefName }}
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ .Values.gateway.name }}
                namespace: {{ .Values.namespace }}
                kind: Gateway
{{- end }}
