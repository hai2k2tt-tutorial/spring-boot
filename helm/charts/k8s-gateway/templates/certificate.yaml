{{- if and .Values.certManager.enabled .Values.certManager.certificate.create }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certManager.certificate.name }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.certManager.certificate.secretName }}
  issuerRef:
    name: {{ .Values.certManager.certificate.issuerRef.name }}
    kind: {{ .Values.certManager.certificate.issuerRef.kind }}
  dnsNames:
{{- if .Values.certManager.certificate.dnsNames }}
{{ toYaml .Values.certManager.certificate.dnsNames | indent 4 }}
{{- else }}
{{- range .Values.routes }}
    - {{ .hostname | quote }}
{{- end }}
{{- end }}
{{- end }}
