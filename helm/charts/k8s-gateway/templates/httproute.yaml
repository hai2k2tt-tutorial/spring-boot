{{- range .Values.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
  hostnames:
    - {{ .hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .backendRefName }}
          port: {{ .backendRefPort }}
{{- end }}
