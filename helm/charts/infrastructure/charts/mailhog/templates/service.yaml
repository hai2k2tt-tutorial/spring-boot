apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: {{ .Values.namespace }}
  labels:
    app: mailhog
spec:
  type: ClusterIP
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
      protocol: TCP
    - name: ui
      port: 8025
      targetPort: 8025
      protocol: TCP
  selector:
    app: mailhog
