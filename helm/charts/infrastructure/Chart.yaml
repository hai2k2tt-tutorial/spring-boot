apiVersion: v2
name: infrastructure
description: Infrastructure stack for the microservices demo
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: mongodb
    version: 0.1.0
    repository: "file://charts/mongodb"
    condition: mongodb.enabled
  - name: postgres
    version: 0.1.0
    repository: "file://charts/postgres"
    condition: postgres.enabled
  - name: kafka
    version: 0.1.0
    repository: "file://charts/kafka"
    condition: kafka.enabled
  - name: keycloak
    version: 0.1.0
    repository: "file://charts/keycloak"
    condition: keycloak.enabled
  - name: mailhog
    version: 0.1.0
    repository: "file://charts/mailhog"
    condition: mailhog.enabled
  - name: minio
    version: 0.1.0
    repository: "file://charts/minio"
    condition: minio.enabled
  - name: observability
    version: 0.1.0
    repository: "file://charts/observability"
    condition: observability.enabled
