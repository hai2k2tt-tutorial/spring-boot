apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-wallet-fe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-wallet-fe
  template:
    metadata:
      labels:
        app: shop-wallet-fe
    spec:
      containers:
        - name: shop-wallet-fe
          image: docker.io/hai2k2tt/shop-wallet-fe:2-arm64
          ports:
            - containerPort: 3007
          env:
            - name: API_BASE_URL
              value: "http://api-gateway.microservices.svc.cluster.local:9000/api"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://api.haint.fyi/api"
            - name: AUTH_URL
              value: "http://shop-wallet-fe.haint.fyi"
            - name: NEXTAUTH_URL
              value: "http://shop-wallet-fe.haint.fyi"
            - name: AUTH_ISSUER
              value: "http://keycloak.haint.fyi/realms/ecommerce-shop"
            - name: AUTH_ISSUER_INTERNAL
              value: "http://keycloak.microservices.svc.cluster.local:8080/realms/ecommerce-shop"
            - name: AUTH_CLIENT_ID
              value: "shop-fe-client"
            - name: AUTH_CLIENT_SECRET
              value: ""
            - name: AUTH_SCOPE
              value: "openid profile offline_access"
            - name: AUTH_COOKIE_PREFIX
              value: "shop-fe"
            - name: AUTH_COOKIE_DOMAIN
              value: ".haint.fyi"
            - name: AUTH_BASE_PATH
              value: "/api/shop-wallet-fe/auth"
            - name: AUTH_SECRET
              value: "replace-with-a-long-random-string"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
