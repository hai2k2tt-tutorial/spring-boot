apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: broker
  name: kafka-broker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broker
  strategy: { }
  template:
    metadata:
      labels:
        app: broker
    spec:
      enableServiceLinks: false
      containers:
        - image: confluentinc/cp-kafka:7.5.0
          name: broker
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          ports:
            - containerPort: 9092
            - containerPort: 29092
            - containerPort: 29093
          env:
            - name: KAFKA_NODE_ID
              valueFrom:
                configMapKeyRef:
                  key: kafka_node_id
                  name: kafka-broker-config
            - name: KAFKA_PROCESS_ROLES
              valueFrom:
                configMapKeyRef:
                  key: kafka_process_roles
                  name: kafka-broker-config
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              valueFrom:
                configMapKeyRef:
                  key: kafka_controller_quorum_voters
                  name: kafka-broker-config
            - name: KAFKA_LISTENERS
              valueFrom:
                configMapKeyRef:
                  key: kafka_listeners
                  name: kafka-broker-config
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              valueFrom:
                configMapKeyRef:
                  key: kafka_listener_security_protocol_map
                  name: kafka-broker-config
            - name: KAFKA_ADVERTISED_LISTENERS
              valueFrom:
                configMapKeyRef:
                  key: kafka_advertised_listeners
                  name: kafka-broker-config
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              valueFrom:
                configMapKeyRef:
                  key: kafka_controller_listener_names
                  name: kafka-broker-config
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              valueFrom:
                configMapKeyRef:
                  key: kafka_inter_broker_listener_name
                  name: kafka-broker-config
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              valueFrom:
                configMapKeyRef:
                  key: kafka_offsets_topic_replication_factor
                  name: kafka-broker-config
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              valueFrom:
                configMapKeyRef:
                  key: kafka_transaction_state_log_min_isr
                  name: kafka-broker-config
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              valueFrom:
                configMapKeyRef:
                  key: kafka_transaction_state_log_replication_factor
                  name: kafka-broker-config
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              valueFrom:
                configMapKeyRef:
                  key: kafka_group_initial_rebalance_delay_ms
                  name: kafka-broker-config
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  key: cluster_id
                  name: kafka-broker-config
