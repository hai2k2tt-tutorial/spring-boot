apiVersion: v1
kind: Service
metadata:
  labels:
    app: broker
  name: broker
spec:
  type: ClusterIP
  ports:
    - port: 9092
      protocol: TCP
      targetPort: 9092
      name: kafka
    - port: 29092
      protocol: TCP
      targetPort: 29092
      name: kafka-internal
  selector:
    app: broker
