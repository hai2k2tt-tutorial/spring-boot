apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: prometheus
  name: prometheus-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  strategy: { }
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      enableServiceLinks: false
      containers:
        - image: prom/prometheus:v2.46.0
          name: prometheus
          resources: { }
          ports:
            - containerPort: 9090
          args:
            - --enable-feature=exemplar-storage
            - --config.file=/etc/prometheus/prometheus.yml
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config