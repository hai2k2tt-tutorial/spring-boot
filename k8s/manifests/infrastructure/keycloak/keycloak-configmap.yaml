apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
data:
  db_vendor: 'MYSQL'
  db_addr: 'keycloak-mysql'
  db_database: 'keycloak'
  db_user: 'keycloak'
  keycloak_admin: 'admin'
  kc_http_enabled: 'true'
  kc_hostname: 'keycloak.local'
  kc_proxy_headers: 'xforwarded'
  kc_hostname_strict: 'false'
  kc_hostname_strict_https: 'false'
  ecommerce-admin-realm.json: |-
    {
      "realm": "ecommerce-admin",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Administration frontend users",
            "composite": false,
            "clientRole": false,
            "attributes": {}
          }
        ]
      },
      "clients": [
        {
          "clientId": "admin-fe-client",
          "name": "Admin Frontend",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "redirectUris": [
            "http://localhost:3002",
            "http://localhost:3002/api/auth/callback/keycloak",
            "http://localhost:3002/api/admin-fe/auth/callback/keycloak",
            "http://admin-fe.local:8080",
            "http://admin-fe.local:8080/*",
            "http://admin-fe.local:8080/api/auth/callback/keycloak",
            "http://admin-fe.local:8080/api/admin-fe/auth/callback/keycloak",
            "http://admin-fe.haint.fyi",
            "http://admin-fe.haint.fyi/*",
            "http://admin-fe.haint.fyi/api/auth/callback/keycloak",
            "http://admin-fe.haint.fyi/api/admin-fe/auth/callback/keycloak"
          ],
          "webOrigins": [
            "*"
          ],
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "publicClient": true,
          "frontchannelLogout": true,
          "protocol": "openid-connect",
          "attributes": {
            "oidc.ciba.grant.enabled": "false",
            "oauth2.device.authorization.grant.enabled": "false",
            "backchannel.logout.session.required": "true",
            "backchannel.logout.revoke.offline.tokens": "false"
          },
          "fullScopeAllowed": true,
          "defaultClientScopes": [
            "web-origins",
            "acr",
            "roles",
            "profile",
            "email"
          ],
          "optionalClientScopes": [
            "address",
            "phone",
            "offline_access",
            "microprofile-jwt"
          ]
        }
      ]
    }
